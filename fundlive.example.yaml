# FundLive Project Configuration
# Copy this file to fundlive.yaml in the project root.
# Environment variables still override these values when set.

server:
  port: 8080
  allowed_origins:
    - http://127.0.0.1:3000
    - http://localhost:3000

storage:
  mode: postgres

quote:
  default_source: sina

database:
  host: 127.0.0.1
  port: 5432
  user: postgres
  password: your-db-password
  name: my-db
  ssl_mode: disable
  timezone: Asia/Shanghai
  log_level: warn
  auto_migrate: false

auth:
  cookie_name: fundlive_session
  cookie_secure: false
  session_ttl_hours: 720
  google_client_id: ""

payment:
  wechat_pay:
    enabled: false
    app_id: ""
    merchant_id: ""
    merchant_certificate_serial_no: ""
    merchant_private_key_path: ""
    api_v3_key: ""
    notify_url: ""
    platform_certificate_path: ""
    platform_public_key_path: ""
    platform_serial_no: ""
